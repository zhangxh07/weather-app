<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查询历史记录 - 天气应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
        }

        .filters {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .filter-item {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .batch-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .select-all {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .history-list {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .history-header {
            display: grid;
            grid-template-columns: 50px 2fr 1fr 1fr 1fr 1fr 100px;
            gap: 20px;
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            font-weight: bold;
            color: #333;
        }

        .history-item {
            display: grid;
            grid-template-columns: 50px 2fr 1fr 1fr 1fr 1fr 100px;
            gap: 20px;
            padding: 15px 20px;
            border-bottom: 1px solid #e9ecef;
            align-items: center;
        }

        .history-item:hover {
            background: #f8f9fa;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .location-info {
            display: flex;
            flex-direction: column;
        }

        .location-name {
            font-weight: bold;
            color: #333;
        }

        .location-details {
            font-size: 0.9em;
            color: #666;
        }

        .weather-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .weather-icon {
            width: 30px;
            height: 30px;
        }

        .temperature {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .query-type {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            text-align: center;
        }

        .query-type-current {
            background: #e3f2fd;
            color: #1976d2;
        }

        .query-type-forecast {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .timestamp {
            color: #666;
            font-size: 0.9em;
        }

        .actions-cell {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .view-btn {
            background: #e3f2fd;
            color: #1976d2;
        }

        .delete-btn {
            background: #ffebee;
            color: #d32f2f;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .page-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: #666;
        }

        .export-options {
            display: flex;
            gap: 10px;
        }

        /* 分页样式增强 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .page-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .page-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            min-width: 80px;
        }

        .page-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #ccc;
        }

        .page-info {
            color: #666;
            font-size: 14px;
            background: #f8f9fa;
            padding: 8px 16px;
            border-radius: 8px;
            min-width: 150px;
            text-align: center;
        }

        .page-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-left: 20px;
        }

        .page-input {
            width: 60px;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
        }

        .go-btn {
            padding: 8px 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .go-btn:hover {
            background: #218838;
        }

        .limit-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 20px;
        }

        .limit-selector select {
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 16px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* 更新历史记录列表样式以适应分页 */
        .history-list {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            min-height: 400px; /* 确保有足够高度 */
        }

        .history-footer {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .history-header, .history-item {
                grid-template-columns: 40px 1fr;
                gap: 10px;
            }

            .hidden-mobile {
                display: none;
            }

            .filters .filter-group {
                flex-direction: column;
            }

            .filter-item {
                min-width: 100%;
            }

            .actions {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
            }
            .pagination {
                flex-direction: column;
                gap: 10px;
            }

            .page-controls, .page-inputs, .limit-selector {
                margin: 5px 0;
            }

            .page-btn {
                min-width: 70px;
                padding: 6px 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <span>📜</span>
                天气查询历史记录
            </h1>
            <div class="nav-buttons">
                <a href="/" class="btn">
                    <span>🏠</span>
                    返回首页
                </a>
                <button class="btn" onclick="refreshHistory()">
                    <span>🔄</span>
                    刷新
                </button>
            </div>
        </header>

        <div class="stats-container" id="statsContainer">
            <!-- 统计信息会动态填充 -->
        </div>

        <div class="filters">
            <div class="filter-group">
                <div class="filter-item">
                    <label for="searchInput">搜索</label>
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="输入城市名称或国家..."
                        oninput="debouncedSearch()"
                    >
                </div>
                <div class="filter-item">
                    <label for="queryType">查询类型</label>
                    <select id="queryType" onchange="applyFilters()">
                        <option value="">全部类型</option>
                        <option value="current">当前天气</option>
                        <option value="forecast">天气预报</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="startDate">开始日期</label>
                    <input type="date" id="startDate" onchange="applyFilters()">
                </div>
                <div class="filter-item">
                    <label for="endDate">结束日期</label>
                    <input type="date" id="endDate" onchange="applyFilters()">
                </div>
            </div>
        </div>

        <div class="actions">
            <div class="batch-actions">
                <div class="select-all">
                    <input
                        type="checkbox"
                        id="selectAll"
                        onchange="toggleSelectAll(this.checked)"
                    >
                    <label for="selectAll">全选</label>
                </div>
                <button class="btn btn-danger" onclick="deleteSelected()">
                    <span>🗑️</span>
                    删除选中
                </button>
                <button class="btn btn-secondary" onclick="clearAllHistory()">
                    <span>🧹</span>
                    清空全部
                </button>
            </div>
            <div class="export-options">
                <button class="btn" onclick="exportHistory('json')">
                    <span>📥</span>
                    导出JSON
                </button>
                <button class="btn" onclick="exportHistory('csv')">
                    <span>📊</span>
                    导出CSV
                </button>
            </div>
        </div>

        <div class="history-list">
            <div class="history-header">
                <div><input type="checkbox" disabled></div>
                <div>地点</div>
                <div class="hidden-mobile">天气</div>
                <div class="hidden-mobile">温度</div>
                <div class="hidden-mobile">类型</div>
                <div class="hidden-mobile">查询时间</div>
                <div>操作</div>
            </div>

            <div id="historyList">
                <!-- 历史记录会动态填充 -->
            </div>
            <div class="history-footer" id="historyFooter">
                <!-- 分页信息会动态填充 -->
            </div>
        </div>

        <div class="pagination">
            <div class="page-controls">
                <button class="page-btn" id="firstPage" onclick="goToPage(1)" disabled>首页</button>
                <button class="page-btn" id="prevPage" onclick="goToPage(currentPage - 1)" disabled>上一页</button>
            </div>

            <div class="page-info" id="pageInfo">
                第 <span id="currentPageNum">1</span> 页 / 共 <span id="totalPages">1</span> 页
                <span id="totalRecords"> (共 0 条记录)</span>
            </div>

            <div class="page-controls">
                <button class="page-btn" id="nextPage" onclick="goToPage(currentPage + 1)" disabled>下一页</button>
                <button class="page-btn" id="lastPage" onclick="goToPage(totalPages)" disabled>末页</button>
            </div>

            <div class="page-inputs">
                <input
                    type="number"
                    id="jumpPageInput"
                    class="page-input"
                    min="1"
                    value="1"
                    onkeypress="handlePageInputKeypress(event)"
                >
                <button class="go-btn" onclick="jumpToPage()">跳转</button>
            </div>

            <div class="limit-selector">
                <span>每页显示:</span>
                <select id="pageSizeSelect" onchange="changePageSize()">
                    <option value="10">10 条</option>
                    <option value="20" selected>20 条</option>
                    <option value="50">50 条</option>
                    <option value="100">100 条</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        // 分页状态变量
        let currentPage = 1;
        let totalPages = 1;
        let totalRecords = 0;
        let pageSize = 20;
        let selectedItems = new Set();
        let debounceTimer = null;

        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                loadStats(),
                loadHistory()
            ]);
        });

        // 加载统计信息
        async function loadStats() {
            try {
                const response = await fetch('/api/history/stats');
                if (!response.ok) throw new Error('获取统计信息失败');

                const data = await response.json();
                if (data.success) {
                    renderStats(data.data);
                }
            } catch (error) {
                console.error('加载统计信息失败:', error);
            }
        }

        // 渲染统计信息
        function renderStats(stats) {
            const statsContainer = document.getElementById('statsContainer');

            statsContainer.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">总查询次数</div>
                    <div class="stat-value">${stats.total}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">今日查询</div>
                    <div class="stat-value">${stats.today}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">昨日查询</div>
                    <div class="stat-value">${stats.yesterday}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">最常查询城市</div>
                    <div class="stat-value">${stats.mostFrequentCities[0]?.city || '无'}</div>
                    <div class="stat-label">${stats.mostFrequentCities[0]?.count || 0} 次</div>
                </div>
            `;
        }

        // 加载历史记录
        // 加载历史记录（支持分页）
        async function loadHistory() {
            const historyList = document.getElementById('historyList');
            const historyFooter = document.getElementById('historyFooter');

            // 显示加载状态
            historyList.innerHTML = '<div class="loading">正在加载历史记录...</div>';
            historyFooter.innerHTML = '';

            try {
                const filters = getFilters();
                const response = await fetch(
                    `/api/history?page=${currentPage}&limit=${pageSize}&` +
                    new URLSearchParams(filters).toString()
                );

                if (!response.ok) throw new Error('获取历史记录失败');

                const result = await response.json();
                if (result.success) {
                    const { records, pagination } = result.data;
                    renderHistory(records);
                    updatePagination(pagination);
                } else {
                    throw new Error(result.error || '获取历史记录失败');
                }
            } catch (error) {
                historyList.innerHTML = `
                    <div class="no-data">
                        <p>加载历史记录失败: ${error.message}</p>
                        <button class="btn" onclick="loadHistory()">重试</button>
                    </div>
                `;
                updatePagination({
                    page: 1,
                    total: 0,
                    totalPages: 1,
                    hasNext: false,
                    hasPrev: false
                });
            }
        }

        // 渲染历史记录列表
        function renderHistory(records) {
            const historyList = document.getElementById('historyList');
            const historyFooter = document.getElementById('historyFooter');

            if (!records || records.length === 0) {
                historyList.innerHTML = '<div class="no-data">暂无查询记录</div>';
                historyFooter.innerHTML = '<div>没有找到任何历史记录</div>';
                return;
            }

            // 渲染记录列表
            historyList.innerHTML = records.map(record => `
                <div class="history-item" id="record-${record.id}">
                    <div>
                        <input
                            type="checkbox"
                            class="checkbox"
                            ${selectedItems.has(record.id) ? 'checked' : ''}
                            onchange="toggleSelectItem('${record.id}', this.checked)"
                        >
                    </div>
                    <div class="location-info">
                        <div class="location-name">${record.location.name}</div>
                        <div class="location-details">
                            ${record.location.region ? record.location.region + ', ' : ''}
                            ${record.location.country}
                        </div>
                    </div>
                    <div class="weather-info hidden-mobile">
                        ${record.weather.icon ?
                            `<img src="https:${record.weather.icon}" alt="${record.weather.condition}" class="weather-icon">` :
                            ''
                        }
                        <span>${record.weather.condition || '--'}</span>
                    </div>
                    <div class="temperature hidden-mobile">
                        ${record.weather.temp_c ? record.weather.temp_c + '°C' : '--'}
                    </div>
                    <div>
                        <span class="query-type query-type-${record.queryType}">
                            ${record.queryType === 'current' ? '当前天气' : '天气预报'}
                        </span>
                    </div>
                    <div class="timestamp hidden-mobile">
                        ${record.timestampDisplay || '--'}
                    </div>
                    <div class="actions-cell">
                        <button class="action-btn view-btn" onclick="viewRecord('${record.id}')">
                            查看
                        </button>
                        <button class="action-btn delete-btn" onclick="deleteRecord('${record.id}')">
                            删除
                        </button>
                    </div>
                </div>
            `).join('');

            // 更新页脚信息
            const startRecord = (currentPage - 1) * pageSize + 1;
            const endRecord = startRecord + records.length - 1;
            historyFooter.innerHTML = `
                显示 ${startRecord} - ${endRecord} 条记录，共 ${totalRecords} 条
            `;
        }

        // 更新分页控件状态
        function updatePagination(pagination) {
            currentPage = pagination.page || 1;
            totalPages = pagination.totalPages || 1;
            totalRecords = pagination.total || 0;

            // 更新显示信息
            document.getElementById('currentPageNum').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages;
            document.getElementById('totalRecords').textContent = ` (共 ${totalRecords} 条记录)`;

            // 更新跳转输入框
            document.getElementById('jumpPageInput').value = currentPage;
            document.getElementById('jumpPageInput').max = totalPages;

            // 更新按钮状态
            document.getElementById('firstPage').disabled = currentPage <= 1;
            document.getElementById('prevPage').disabled = currentPage <= 1;
            document.getElementById('nextPage').disabled = currentPage >= totalPages;
            document.getElementById('lastPage').disabled = currentPage >= totalPages;

            // 更新每页显示数选择
            document.getElementById('pageSizeSelect').value = pageSize;
        }

        // 跳转到指定页面
        function goToPage(page) {
            const targetPage = Math.max(1, Math.min(page, totalPages));
            if (targetPage !== currentPage) {
                currentPage = targetPage;
                loadHistory();
            }
        }

        // 输入框跳转
        function jumpToPage() {
            const input = document.getElementById('jumpPageInput');
            const targetPage = parseInt(input.value);

            if (isNaN(targetPage) || targetPage < 1 || targetPage > totalPages) {
                alert(`请输入 1 到 ${totalPages} 之间的页码`);
                input.value = currentPage;
                return;
            }

            goToPage(targetPage);
        }

        // 处理输入框回车键
        function handlePageInputKeypress(event) {
            if (event.key === 'Enter') {
                jumpToPage();
            }
        }

        // 改变每页显示数量
        function changePageSize() {
            const newPageSize = parseInt(document.getElementById('pageSizeSelect').value);

            if (newPageSize !== pageSize) {
                pageSize = newPageSize;
                currentPage = 1; // 重置到第一页
                selectedItems.clear(); // 清空选择
                document.getElementById('selectAll').checked = false;
                loadHistory();
            }
        }

        // 获取筛选条件
        function getFilters() {
            return {
                queryType: document.getElementById('queryType').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                search: document.getElementById('searchInput').value
            };
        }

        // 应用筛选条件
        function applyFilters() {
            currentPage = 1;
            selectedItems.clear();
            document.getElementById('selectAll').checked = false;
            loadHistory();
            loadStats(); // 重新加载统计
        }

        // 防抖搜索
        function debouncedSearch() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                applyFilters();
            }, 500);
        }

        // 切换全选
        function toggleSelectAll(checked) {
            const checkboxes = document.querySelectorAll('.checkbox:not([disabled])');
            checkboxes.forEach(checkbox => {
                checkbox.checked = checked;
                const recordId = checkbox.closest('.history-item')?.id?.replace('record-', '');
                if (recordId) {
                    if (checked) {
                        selectedItems.add(recordId);
                    } else {
                        selectedItems.delete(recordId);
                    }
                }
            });
        }

        // 切换单个项目选择
        function toggleSelectItem(id, checked) {
            if (checked) {
                selectedItems.add(id);
            } else {
                selectedItems.delete(id);
                document.getElementById('selectAll').checked = false;
            }
        }

        // 查看记录详情
        function viewRecord(id) {
            // 这里可以跳转到详细页面或显示模态框
            alert('查看记录详情功能（待实现）');
        }

        // 删除单个记录
        async function deleteRecord(id) {
            if (!confirm('确定要删除这条记录吗？')) return;

            try {
                const response = await fetch(`/api/history/${id}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    alert('记录删除成功');
                    selectedItems.delete(id);

                    // 重新加载数据（如果删除的是当前页最后一条，需要调整页码）
                    const currentRecords = document.querySelectorAll('.history-item').length;
                    if (currentRecords === 1 && currentPage > 1) {
                        currentPage--;
                    }

                    await Promise.all([loadHistory(), loadStats()]);
                } else {
                    alert('删除失败: ' + data.error);
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        // 删除选中记录
        async function deleteSelected() {
            if (selectedItems.size === 0) {
                alert('请先选择要删除的记录');
                return;
            }

            if (!confirm(`确定要删除选中的 ${selectedItems.size} 条记录吗？`)) return;

            try {
                const response = await fetch('/api/history', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ids: Array.from(selectedItems)
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert(`成功删除 ${data.deletedCount} 条记录`);
                    selectedItems.clear();
                    document.getElementById('selectAll').checked = false;
                    //重新加载数据
                    await Promise.all([loadHistory(), loadStats()]);
                } else {
                    alert('批量删除失败: ' + data.error);
                }
            } catch (error) {
                alert('批量删除失败: ' + error.message);
            }
        }

        // 清空所有历史记录
        async function clearAllHistory() {
            if (!confirm('确定要清空所有历史记录吗？此操作不可恢复！')) return;

            try {
                const response = await fetch('/api/history/all/clear', {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    alert('所有历史记录已清空');
                    selectedItems.clear();
                    document.getElementById('selectAll').checked = false;
                    await Promise.all([loadHistory(), loadStats()]);
                } else {
                    alert('清空失败: ' + data.error);
                }
            } catch (error) {
                alert('清空失败: ' + error.message);
            }
        }

        // 导出历史记录
        function exportHistory(format) {
            const filters = getFilters();
            const queryString = new URLSearchParams(filters).toString();
            window.open(`/api/history/export/${format}?${queryString}`, '_blank');
        }

        // 刷新历史记录
        function refreshHistory() {
            selectedItems.clear();
            document.getElementById('selectAll').checked = false;
            currentPage = 1;
            loadHistory();
            loadStats();
        }


        // 切换页面
        function changePage(delta) {
            const newPage = currentPage + delta;

            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                loadHistory();
            }
        }
    </script>
</body>
</html>
